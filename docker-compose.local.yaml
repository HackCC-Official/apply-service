services:
  apply-service:
    build:
      context: .
      dockerfile: Dockerfile.local
    env_file:
      - .env.local
    ports:
      - ${PORT}:3000
    volumes:
      - .:/usr/src/app
      # Run in Debug Mode: npm run start:debug --> Don't forget to start your vscode debugger!
      # Run in dev Mode: npm run start:dev
    command: npm run start:dev
    networks:
      - hacksmc-network
networks:
  hacksmc-network:
    external: true
